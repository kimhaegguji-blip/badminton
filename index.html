<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 환경을 고려한 뷰포트 설정 (터치 줌 방지 및 반응형 레이아웃) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Mini Badminton Challenge</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', 'Jua', sans-serif;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        /* 캔버스 테두리 광원 효과 */
        .game-container {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.25), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between items-center overflow-x-hidden p-2 sm:p-4">

    <!-- 상단 헤더 영역 -->
    <header class="w-full max-w-4xl flex justify-between items-center px-4 py-2 bg-slate-800/80 rounded-2xl border border-slate-700/50 backdrop-blur-md mb-2">
        <div class="flex items-center gap-2">
            <span class="text-2xl sm:text-3xl">🏸</span>
            <div>
                <h1 class="text-base sm:text-xl font-black tracking-wider text-amber-400">MINI BADMINTON</h1>
                <p class="text-[10px] sm:text-xs text-slate-400">PC: 방향키 & Space | Mobile: 터치 패드</p>
            </div>
        </div>
        <!-- 실시간 스코어보드 -->
        <div class="flex items-center gap-4 bg-slate-950/80 px-4 py-1.5 rounded-xl border border-slate-700/30">
            <div class="text-center">
                <span class="block text-[9px] text-red-400 font-bold">PLAYER A</span>
                <span id="scoreA" class="text-lg sm:text-2xl font-black text-red-500">0</span>
            </div>
            <div class="text-slate-500 font-black text-sm sm:text-lg">:</div>
            <div class="text-center">
                <span class="block text-[9px] text-blue-400 font-bold">PLAYER B (AI)</span>
                <span id="scoreB" class="text-lg sm:text-2xl font-black text-blue-500">0</span>
            </div>
        </div>
        <!-- 리스타트 버튼 -->
        <button id="btnRestart" class="bg-gradient-to-r from-amber-500 to-yellow-400 hover:from-amber-600 hover:to-yellow-500 text-slate-950 text-xs sm:text-sm font-extrabold px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl transition-all shadow-md active:scale-95">
            RESTART
        </button>
    </header>

    <!-- 게임 뷰포트 영역 -->
    <main class="relative w-full max-w-4xl aspect-[2/1] game-container bg-slate-950 rounded-2xl overflow-hidden border-4 border-slate-700">
        <!-- 메인 게임 캔버스 -->
        <canvas id="gameCanvas" class="w-full h-full block"></canvas>

        <!-- 게임 대기 로비 화면 (시작 화면) -->
        <div id="gameStartModal" class="absolute inset-0 bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center z-30 transition-all duration-300">
            <span class="text-6xl sm:text-8xl mb-4 animate-bounce">🏸</span>
            <h2 class="text-4xl sm:text-6xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-amber-300 to-yellow-500 drop-shadow">배드민턴 게임</h2>
            <p class="text-slate-300 text-xs sm:text-base mt-2 mb-8 max-w-md text-center px-6 leading-relaxed">
                <span class="text-amber-400 font-bold">PC 조작:</span> [좌우 방향키] 이동, [위 방향키] 점프, <span class="text-yellow-300 font-bold">[스페이스바] 서브 및 스윙</span><br>
                <span class="text-blue-400 font-bold">모바일 조작:</span> 하단의 가상 방향 패드 및 점프, 스윙 버튼 터치
            </p>
            <button id="btnStartGame" class="px-10 py-4 bg-gradient-to-r from-emerald-500 to-teal-400 hover:from-emerald-600 hover:to-teal-500 text-slate-950 font-black text-xl rounded-2xl shadow-lg shadow-emerald-500/20 active:scale-95 transition-all cursor-pointer pointer-events-auto">
                경기 시작하기
            </button>
        </div>

        <!-- 인게임 점수 알림 & 스매시 오버레이 메시지 -->
        <div id="gameAnnounce" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none transition-all duration-300 opacity-0 scale-75">
            <h2 id="announceText" class="text-3xl sm:text-6xl font-black text-yellow-400 drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)] tracking-wider"></h2>
            <p id="announceSubtext" class="text-sm sm:text-xl text-white mt-2 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]"></p>
        </div>

        <!-- 게임 오버 / 승리 팝업 -->
        <div id="gameOverModal" class="absolute inset-0 bg-slate-950/90 backdrop-blur-sm flex flex-col items-center justify-center hidden z-20">
            <span class="text-6xl sm:text-8xl animate-bounce mb-2">🏆</span>
            <h2 id="winnerText" class="text-4xl sm:text-6xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-amber-300 to-yellow-500 drop-shadow">PLAYER A WINS!</h2>
            <p class="text-slate-400 text-sm sm:text-lg mt-2 mb-6">배드민턴 코트의 제왕으로 등극하셨습니다!</p>
            <button id="btnModalRestart" class="px-8 py-3 bg-gradient-to-r from-amber-500 to-yellow-400 hover:from-amber-600 hover:to-yellow-500 text-slate-950 font-black text-lg rounded-2xl shadow-lg shadow-amber-500/20 active:scale-95 transition-all">
                다시 대결하기
            </button>
        </div>
    </main>

    <!-- 모바일 전용 가상 조작 버튼 패널 -->
    <footer class="w-full max-w-4xl grid grid-cols-2 gap-4 mt-2 px-1 pb-2">
        <!-- 왼쪽: 이동 컨트롤 패드 -->
        <div class="flex items-center gap-2">
            <button id="btnLeft" class="flex-1 aspect-[4/3] sm:aspect-square bg-slate-800/80 active:bg-slate-700 border-b-4 border-slate-950 active:border-b-0 rounded-2xl flex items-center justify-center text-2xl sm:text-3xl shadow-lg active:translate-y-[4px] transition-all" style="-webkit-tap-highlight-color: transparent;">
                ◀
            </button>
            <button id="btnRight" class="flex-1 aspect-[4/3] sm:aspect-square bg-slate-800/80 active:bg-slate-700 border-b-4 border-slate-950 active:border-b-0 rounded-2xl flex items-center justify-center text-2xl sm:text-3xl shadow-lg active:translate-y-[4px] transition-all" style="-webkit-tap-highlight-color: transparent;">
                ▶
            </button>
        </div>

        <!-- 오른쪽: 액션 컨트롤 패드 (점프 / 타격) -->
        <div class="flex items-center gap-2">
            <button id="btnJump" class="flex-1 aspect-[4/3] sm:aspect-square bg-blue-600/80 active:bg-blue-500 border-b-4 border-blue-950 active:border-b-0 rounded-2xl flex flex-col items-center justify-center shadow-lg active:translate-y-[4px] transition-all" style="-webkit-tap-highlight-color: transparent;">
                <span class="text-xl sm:text-2xl">▲</span>
                <span class="text-[10px] sm:text-xs font-bold mt-1">JUMP</span>
            </button>
            <button id="btnHit" class="flex-1 aspect-[4/3] sm:aspect-square bg-red-600/90 active:bg-red-500 border-b-4 border-red-950 active:border-b-0 rounded-2xl flex flex-col items-center justify-center shadow-lg active:translate-y-[4px] transition-all" style="-webkit-tap-highlight-color: transparent;">
                <span class="text-xl sm:text-2xl">🎾</span>
                <span class="text-[10px] sm:text-xs font-bold mt-1">HIT</span>
            </button>
        </div>
    </footer>

    <script>
        // --- 사운드 효과음 신시사이저 (Web Audio API) ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioCtx();
            }
        }

        // '팅', '통', '푸슉' 사운드를 신디사이징 기술로 구현
        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            // 브라우저 보완책: 일시정지 상태면 재개
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'ting') {
                // 팅! (맑고 명쾌한 정타 라켓 타구음)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(880, now); // A5 note
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.02);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.16);
            } else if (type === 'tong') {
                // 통! (약간 낮고 부드러운 드라이브나 수비 타구음)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now); // A4 note
                osc.frequency.exponentialRampToValueAtTime(550, now + 0.03);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.21);
            } else if (type === 'phoosh') {
                // 푸슉! (라켓을 힘차게 휘두르는 소리)
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(2000, now + 0.04);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.25);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.26);
            } else if (type === 'score') {
                // 득점 성공 사운드
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.15, now + 0.25);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'out') {
                // 실점/아웃 사운드
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(110, now + 0.3);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            }
        }

        // --- 캔버스 설정 및 물리 시스템 설정 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 가상 월드 해상도 고정 (800x400 비율 보존)
        const VIEW_WIDTH = 800;
        const VIEW_HEIGHT = 400;
        canvas.width = VIEW_WIDTH;
        canvas.height = VIEW_HEIGHT;

        // 게임 물리 변수들
        const GROUND_Y = 340; // 바닥 높이
        const GRAVITY = 0.25; // 중력 가속도
        const NET_X = VIEW_WIDTH / 2; // 네트 중앙 X값
        const NET_HEIGHT = 80; // 네트 높이 (바닥 위로 솟은 크기)

        // 키보드 입력 상태 트래킹
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            Space: false
        };

        // 모바일 터치 상태 트래킹
        const touches = {
            left: false,
            right: false,
            jump: false,
            hit: false
        };

        // 게임 상태 관리
        // 'START_SCREEN' -> 'SERVING_A' -> 'PLAYING' -> 'SERVING_B' -> 'GAME_OVER'
        let gameState = 'START_SCREEN'; 
        let scoreA = 0;
        let scoreB = 0;
        let lastToucher = null; // 마지막으로 셔틀콕을 친 사람 ('A' 또는 'B')
        let trailEffect = []; // 셔틀콕 잔상 이펙트 어레이
        let scoreMessageTimeout = null;
        let aiServeTimer = 0; // AI 서브 딜레이 타이머

        // 구름 이펙트 배경용 데이터
        const clouds = [
            { x: 100, y: 60, scale: 0.8, speed: 0.1 },
            { x: 450, y: 40, scale: 1.2, speed: 0.15 },
            { x: 750, y: 80, scale: 0.6, speed: 0.08 }
        ];

        // 1. 플레이어 A 정의 (사용자 - 빨간색)
        const playerA = {
            x: 150,
            y: GROUND_Y - 50,
            width: 32,
            height: 50,
            vx: 0,
            vy: 0,
            speed: 4.5,
            jumpForce: -8,
            isGrounded: true,
            color: '#ef4444', // 빨간색
            swingTimer: 0,
            swingDuration: 12,
            racketAngle: 0,
            facing: 'right'
        };

        // 2. 플레이어 B 정의 (AI - 파란색)
        const playerB = {
            x: 650,
            y: GROUND_Y - 50,
            width: 32,
            height: 50,
            vx: 0,
            vy: 0,
            speed: 4.0, // AI 이동 속도
            jumpForce: -8,
            isGrounded: true,
            color: '#3b82f6', // 파란색
            swingTimer: 0,
            swingDuration: 12,
            racketAngle: 0,
            facing: 'left'
        };

        // 3. 셔틀콕 정의
        const shuttlecock = {
            x: 200,
            y: 100,
            vx: 0,
            vy: 0,
            radius: 8,
            drag: 0.99, // 공기 저항 (수평 감쇠 가속도)
            verticalDrag: 0.992, // 수직 공기 저항
            rotation: 0
        };

        // 6가지 무작위 샷 데이터 정의
        const shotTypes = {
            fast_smash: { vx: 18, vy: -1.5, sound: 'ting', name: "⚡ Fast Smash", sub: "강력하게 내리꽂는 슬래시 타구!" },
            slow_drop:  { vx: 7, vy: -4.5, sound: 'tong', name: "🎈 Slow Drop", sub: "네트 근처로 뚝 떨어지는 수비 샷" },
            low_drive:  { vx: 14, vy: -0.8, sound: 'ting', name: "☄️ Low Drive", sub: "낮고 길게 날아가는 총알 무빙" },
            high_lob:   { vx: 8, vy: -12.5, sound: 'tong', name: "☁️ High Lob", sub: "하늘 높이 띄워 보내는 수비수 클리어" },
            long_clear: { vx: 14.5, vy: -9.5, sound: 'ting', name: "🚀 Long Clear", sub: "코트 가장 깊숙한 뒤쪽으로 뻗어갑니다" },
            short_net:  { vx: 5, vy: -3, sound: 'tong', name: "🤫 Short Drop", sub: "허를 찌르는 네트 밀착형 잔기술!" }
        };

        function chooseRandomShot() {
            const types = Object.keys(shotTypes);
            const chosenKey = types[Math.floor(Math.random() * types.length)];
            return shotTypes[chosenKey];
        }

        // --- 컨트롤러 이벤트 바인딩 ---

        // 키보드 이벤트 리스너 (PC)
        window.addEventListener('keydown', (e) => {
            initAudio(); // 최초 유저 터치/클릭 연동 오디오 활성화
            if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight') keys.ArrowRight = true;
            if (e.code === 'ArrowUp') keys.ArrowUp = true;
            if (e.code === 'Space') {
                if (gameState === 'SERVING_A') {
                    serve('A');
                } else if (gameState === 'PLAYING') {
                    if (!keys.Space) {
                        playerA.swingTimer = playerA.swingDuration;
                        checkRacketHit(playerA, 'A');
                    }
                }
                keys.Space = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight') keys.ArrowRight = false;
            if (e.code === 'ArrowUp') keys.ArrowUp = false;
            if (e.code === 'Space') keys.Space = false;
        });

        // 모바일 가상 버튼 바인딩 (터치 장치 전용)
        const configureTouchBtn = (id, targetState) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                touches[targetState] = true;
                
                // 일회성 입력 처리 (점프 및 스윙)
                if (targetState === 'jump' && playerA.isGrounded && gameState === 'PLAYING') {
                    playerA.vy = playerA.jumpForce;
                    playerA.isGrounded = false;
                }
                if (targetState === 'hit') {
                    if (gameState === 'SERVING_A') {
                        serve('A');
                    } else if (gameState === 'PLAYING') {
                        if (playerA.swingTimer === 0) {
                            playerA.swingTimer = playerA.swingDuration;
                            checkRacketHit(playerA, 'A');
                        }
                    }
                }
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                touches[targetState] = false;
            });
        };

        configureTouchBtn('btnLeft', 'left');
        configureTouchBtn('btnRight', 'right');
        configureTouchBtn('btnJump', 'jump');
        configureTouchBtn('btnHit', 'hit');

        // 로비 시작 버튼 처리
        document.getElementById('btnStartGame').addEventListener('click', () => {
            initAudio();
            document.getElementById('gameStartModal').classList.add('hidden');
            resetServe('A');
        });

        // 리스타트 버튼 처리
        const handleRestart = () => {
            scoreA = 0;
            scoreB = 0;
            updateScoreDisplay();
            document.getElementById('gameOverModal').classList.add('hidden');
            resetServe('A');
        };

        document.getElementById('btnRestart').addEventListener('click', handleRestart);
        document.getElementById('btnModalRestart').addEventListener('click', handleRestart);

        // --- 배드민턴 타격 물리 계산 엔진 ---

        function checkRacketHit(player, sender) {
            // 라켓 휘두르는 휙 소리 우선 재생
            playSound('phoosh');

            // 라켓 타격 판정 범위 (라켓 길이 반영)
            const reach = 60;
            const px = player.x + player.width / 2;
            const py = player.y + player.height / 2;

            // 라켓과 셔틀콕 사이의 거리 구하기
            const dx = shuttlecock.x - px;
            const dy = shuttlecock.y - py;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < reach) {
                // 타격 성공!
                lastToucher = sender;

                // 6가지 샷 무작위 선택 적용
                const shot = chooseRandomShot();
                
                // 타구 속도 보정 (플레이어의 현재 이동 속도를 일부 전이시킴)
                const movementBonus = player.vx * 0.3;

                if (sender === 'A') {
                    shuttlecock.vx = shot.vx + movementBonus + (Math.random() - 0.5) * 1.5;
                    shuttlecock.vy = shot.vy + (Math.random() - 0.5) * 1.5;
                } else {
                    // AI가 좌향 타격하는 경우 X 반전
                    shuttlecock.vx = -shot.vx + movementBonus + (Math.random() - 0.5) * 1.5;
                    shuttlecock.vy = shot.vy + (Math.random() - 0.5) * 1.5;
                }

                // 무작위 효과음 재생 및 자막 출력
                playSound(shot.sound);
                triggerAnnounce(shot.name, shot.sub);

                // 스매시 스파크 이펙트 재생을 위해 잔상 활성화
                for (let i = 0; i < 5; i++) {
                    trailEffect.push({
                        x: shuttlecock.x,
                        y: shuttlecock.y,
                        alpha: 0.8,
                        size: 6
                    });
                }
            }
        }

        // --- 득점 규칙 판정 및 서브 리셋 로직 ---

        function triggerAnnounce(mainText, subText) {
            const container = document.getElementById('gameAnnounce');
            const main = document.getElementById('announceText');
            const sub = document.getElementById('announceSubtext');

            main.innerText = mainText;
            sub.innerText = subText;

            container.classList.remove('opacity-0', 'scale-75');
            container.classList.add('opacity-100', 'scale-100');

            if (scoreMessageTimeout) clearTimeout(scoreMessageTimeout);
            scoreMessageTimeout = setTimeout(() => {
                container.classList.
